<!doctype html>
<html lang="en" data-theme="dark-neon">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — InsightGrade AI</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/mobile.css" />
    <style>
      .auth-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .auth-card {
        width: 100%;
        max-width: 420px;
        padding: 44px 40px;
        animation: pageIn 0.5s ease;
      }
      .auth-logo {
        font-family: var(--font-display);
        font-size: 1.9rem;
        font-weight: 800;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 6px;
      }
      .pw-toggle {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        cursor: pointer;
        background: none;
        border: none;
        padding: 4px;
      }
      .pw-wrap {
        position: relative;
      }
      .pw-wrap .form-input {
        padding-right: 44px;
      }
      .pw-strength-bar-wrap {
        height: 3px;
        background: var(--bg-card);
        border-radius: 2px;
        margin-top: 6px;
        overflow: hidden;
      }
      .pw-strength-bar {
        height: 100%;
        width: 0;
        border-radius: 2px;
        transition:
          width 0.4s,
          background 0.4s;
      }
    </style>
  </head>
  <body>
    <div class="bg-mesh"></div>
    <div id="toast-container"></div>
    <div class="auth-page">
      <div class="auth-card glass">
        <div class="auth-logo">✦ InsightGrade</div>
        <div
          style="
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 32px;
          "
        >
          Password Recovery
        </div>
        <div
          style="
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 6px;
          "
        >
          Set New Password
        </div>
        <div
          style="
            font-size: 0.88rem;
            color: var(--text-secondary);
            margin-bottom: 28px;
          "
        >
          Choose a strong password for your account.
        </div>

        <form id="reset-form">
          <div class="form-group">
            <label class="form-label">New Password</label>
            <div class="pw-wrap">
              <input
                class="form-input"
                type="password"
                name="password"
                id="password"
                placeholder="Min. 6 characters"
                required
              />
              <button type="button" class="pw-toggle" data-toggle-pw="password">
                <svg
                  data-eye
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
                <svg
                  data-eye-off
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  style="display: none"
                >
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"
                  />
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
              </button>
            </div>
            <div class="pw-strength-bar-wrap">
              <div class="pw-strength-bar" id="pw-strength-bar"></div>
            </div>
            <div
              style="font-size: 0.72rem; margin-top: 4px"
              id="pw-strength-label"
            ></div>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input
              class="form-input"
              type="password"
              name="confirm"
              placeholder="Repeat password"
              required
            />
          </div>
          <button
            type="submit"
            class="btn btn-primary w-full btn-lg"
            style="justify-content: center"
          >
            Reset Password
          </button>
        </form>

        <div
          style="
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
          "
        >
          <a href="login.html" style="color: var(--accent); font-weight: 600"
            >← Back to Sign In</a
          >
        </div>
      </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
