<!doctype html>
<html lang="en" data-theme="dark-neon">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — InsightGrade AI</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/mobile.css" />
    <style>
      .auth-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        position: relative;
      }
      .auth-card {
        width: 100%;
        max-width: 440px;
        padding: 44px 40px;
        position: relative;
        z-index: 1;
        animation: pageIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .auth-logo {
        font-family: var(--font-display);
        font-size: 1.9rem;
        font-weight: 800;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 6px;
      }
      .auth-tagline {
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-bottom: 36px;
      }
      .auth-heading {
        font-family: var(--font-display);
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 6px;
      }
      .auth-subheading {
        font-size: 0.88rem;
        color: var(--text-secondary);
        margin-bottom: 28px;
      }
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 20px 0;
        color: var(--text-muted);
        font-size: 0.78rem;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }
      .auth-link {
        text-align: center;
        font-size: 0.85rem;
        color: var(--text-secondary);
        margin-top: 20px;
      }
      .auth-link a {
        color: var(--accent);
        font-weight: 600;
      }
      .pw-toggle {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        cursor: pointer;
        background: none;
        border: none;
        padding: 4px;
      }
      .pw-wrap {
        position: relative;
      }
      .pw-wrap .form-input {
        padding-right: 44px;
      }
      .bg-orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.08;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div class="bg-mesh"></div>
    <div
      class="bg-orb"
      style="
        width: 500px;
        height: 500px;
        background: var(--accent);
        top: -100px;
        right: -100px;
      "
    ></div>
    <div
      class="bg-orb"
      style="
        width: 400px;
        height: 400px;
        background: var(--accent-2);
        bottom: -50px;
        left: -100px;
      "
    ></div>
    <div id="toast-container"></div>

    <div class="auth-page">
      <div class="auth-card glass">
        <div class="auth-logo">✦ InsightGrade</div>
        <div class="auth-tagline">Academic Intelligence Platform</div>

        <div class="auth-heading">Welcome back</div>
        <div class="auth-subheading">Sign in to your account to continue</div>

        <form id="login-form" autocomplete="on">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input
              class="form-input"
              type="email"
              name="email"
              placeholder="you@example.com"
              required
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label
              class="form-label"
              style="display: flex; justify-content: space-between"
            >
              Password
              <a
                href="/forgot-password.html"
                style="
                  color: var(--accent);
                  font-weight: 500;
                  text-transform: none;
                  font-size: 0.78rem;
                "
                >Forgot?</a
              >
            </label>
            <div class="pw-wrap">
              <input
                class="form-input"
                type="password"
                name="password"
                id="password"
                placeholder="••••••••"
                required
                autocomplete="current-password"
              />
              <button type="button" class="pw-toggle" data-toggle-pw="password">
                <svg
                  data-eye
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
                <svg
                  data-eye-off
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  style="display: none"
                >
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"
                  />
                  <line x1="1" y1="1" x2="23" y2="23" />
                </svg>
              </button>
            </div>
          </div>

          <button
            type="submit"
            class="btn btn-primary w-full btn-lg"
            style="justify-content: center; margin-top: 8px"
          >
            Sign In
          </button>
        </form>

        <div class="divider">*****</div>

        <div
          style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px"
        ></div>

        <div class="auth-link">
          Don't have an account? <a href="register.html">Create one</a>
        </div>
      </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
      async function demoLogin(role) {
        const creds = {
          student: {
            email: "demo.student@insightgrade.ai",
            password: "Demo@1234",
          },
          teacher: {
            email: "demo.teacher@insightgrade.ai",
            password: "Demo@1234",
          },
        };
        const input = document.querySelector("[name=email]");
        const pw = document.querySelector("[name=password]");
        input.value = creds[role].email;
        pw.value = creds[role].password;
        document
          .getElementById("login-form")
          .dispatchEvent(new Event("submit"));
      }
    </script>
  </body>
</html>
