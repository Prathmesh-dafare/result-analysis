<!doctype html>
<html lang="en" data-theme="dark-neon">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password — InsightGrade AI</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/mobile.css" />
    <style>
      .auth-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .auth-card {
        width: 100%;
        max-width: 420px;
        padding: 44px 40px;
        animation: pageIn 0.5s ease;
      }
      .auth-logo {
        font-family: var(--font-display);
        font-size: 1.9rem;
        font-weight: 800;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 6px;
      }
      .success-box {
        text-align: center;
        padding: 32px 20px;
      }
      .success-icon {
        font-size: 3rem;
        margin-bottom: 16px;
      }
    </style>
    <!-- EmailJS (optional) -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  </head>
  <body>
    <div class="bg-mesh"></div>
    <div id="toast-container"></div>
    <div class="auth-page">
      <div class="auth-card glass">
        <div class="auth-logo">✦ InsightGrade</div>
        <div
          style="
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 32px;
          "
        >
          Password Recovery
        </div>
        <div
          style="
            font-family: var(--font-display);
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 6px;
          "
        >
          Forgot Password?
        </div>
        <div
          style="
            font-size: 0.88rem;
            color: var(--text-secondary);
            margin-bottom: 28px;
          "
        >
          Enter your email and we'll send a reset link.
        </div>

        <form id="forgot-form">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <input
              class="form-input"
              type="email"
              name="email"
              placeholder="you@example.com"
              required
            />
          </div>
          <button
            type="submit"
            class="btn btn-primary w-full btn-lg"
            style="justify-content: center"
          >
            Send Reset Link
          </button>
        </form>

        <div id="forgot-success" class="success-box hidden">
          <div class="success-icon">📧</div>
          <div
            style="
              font-family: var(--font-display);
              font-size: 1.1rem;
              font-weight: 700;
              margin-bottom: 8px;
            "
          >
            Check your inbox!
          </div>
          <div style="font-size: 0.85rem; color: var(--text-secondary)">
            A password reset link has been sent to your email. It expires in 10
            minutes.
          </div>
        </div>

        <div
          style="
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--text-secondary);
          "
        >
          <a href="login.html" style="color: var(--accent); font-weight: 600"
            >← Back to Sign In</a
          >
        </div>
      </div>
    </div>
    <script>
      // EmailJS config — set these before deploying
      window.EMAILJS_SERVICE_ID = "YOUR_SERVICE_ID";
      window.EMAILJS_TEMPLATE_ID = "YOUR_TEMPLATE_ID";
      window.EMAILJS_PUBLIC_KEY = "YOUR_PUBLIC_KEY";
    </script>
    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
